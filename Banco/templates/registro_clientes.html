{% extends 'formato.html' %}

{% block section%}
<div class="container mt-5">
    <div class="card">
        <div class="card-header bg-secondary text-white">
        Registro de Cliente
        </div>

        <div class="card-body">

            <form method="post">

                {% csrf_token %}

                <div class="mb-3">
                    <label>Nombre</label>
                    {{ form.nombre }}
                </div>

                <div class="mb-3">
                    <label>DPI</label>
                    {{ form.dpi }}
                </div>

                <div class="mb-3">
                    <label>Telefono</label>
                    {{ form.telefono }}
                </div>

                <button class="btn btn-success">Guardar</button>
            </form>
        </div>
    </div>
</div>

{% endblock section %}
